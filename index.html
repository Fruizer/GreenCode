<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenCode | Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Tactical Grid Background matching the dashboard */
        body { 
            background-color: #d1d5db; 
            background-image: radial-gradient(#9ca3af 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        } 
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.95); 
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.2); 
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="font-sans text-gray-800">

    <div class="glass-card p-8 rounded-3xl w-full max-w-sm flex flex-col items-center relative overflow-hidden">
        
        <div class="absolute top-[-50px] left-1/2 -translate-x-1/2 w-32 h-32 bg-emerald-500/20 blur-[40px] rounded-full pointer-events-none"></div>

        <h1 class="text-2xl font-black tracking-tight text-[#115e59] mb-1 z-10">GreenCode</h1>
        <p class="text-[10px] font-bold tracking-widest text-emerald-600/60 uppercase mb-8 z-10">By GILBERTO Systems</p>

        <div class="w-full space-y-4 z-10">
            <div>
                <label class="block text-[10px] font-black tracking-widest text-gray-500 uppercase mb-1">Email Address</label>
                <input type="email" id="authEmail" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 font-mono" placeholder="developer@greencode.com">
            </div>
            <div>
                <label class="block text-[10px] font-black tracking-widest text-gray-500 uppercase mb-1">Password</label>
                <input type="password" id="authPassword" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 font-mono" placeholder="••••••••">
            </div>

            <p id="authMessage" class="text-[10px] font-bold text-center uppercase tracking-widest hidden"></p>

            <div class="pt-2 flex flex-col gap-2">
                <button onclick="login()" class="w-full bg-[#115e59] hover:bg-emerald-700 text-white font-black py-3 rounded-xl transition-all shadow-md uppercase tracking-widest text-sm">Access Terminal</button>
                <button onclick="signUp()" class="w-full bg-white border-2 border-[#115e59] text-[#115e59] hover:bg-emerald-50 font-black py-3 rounded-xl transition-all uppercase tracking-widest text-sm">Register</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Supabase (Matches your app.js credentials)
        const supabaseUrl = 'https://fadbccudiffeneemlmvb.supabase.co';
        const supabaseKey = 'sb_publishable__VXBEPzv_zSCuysL-UO02Q_LQ2kHh8z';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        function showMessage(msg, isError) {
            const msgEl = document.getElementById('authMessage');
            msgEl.textContent = msg;
            msgEl.className = `text-[10px] font-bold text-center uppercase tracking-widest mt-2 ${isError ? 'text-red-500' : 'text-emerald-600'}`;
            msgEl.classList.remove('hidden');
        }

        async function login() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;

            if (!email || !password) return showMessage("Please enter email and password.", true);
            
            showMessage("Authenticating...", false);

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                showMessage(error.message, true);
            } else {
                showMessage("Access Granted. Redirecting...", false);
                // Redirect to the newly renamed dashboard!
                setTimeout(() => window.location.href = 'dashboard.html', 500);
            }
        }

        async function signUp() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;

            if (!email || !password) return showMessage("Please enter email and password.", true);

            showMessage("Registering User...", false);

            const { data, error } = await supabaseClient.auth.signUp({ email, password });

            if (error) {
                showMessage(error.message, true);
            } else {
                showMessage("Registration successful! You may now log in.", false);
            }
        }
    </script>
</body>
</html>
